<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complaint Registration Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <div class="brand">Complaint Registration Portal</div>
        <div class="top-controls">
          <div class="backend-switcher">
            <label for="backend-select">Backend</label>
            <select id="backend-select" onchange="window.app.setApiHost(this.value)">
              <option value="local">Localhost</option>
              <option value="render">Render</option>
            </select>
          </div>
          <nav id="top-nav"></nav>
        </div>
      </header>

      <main id="app"></main>

      <footer>
        <small>Designed for local development with a backend API.</small>
      </footer>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
